    <script>(function () {
        const fetchConfig = {
            credentials: "same-origin",
            mode: "cors",
            priority: "low",
            cache: "no-store",
            headers: {Accept: "application/json", "Content-Type": "application/json"}
        };
        const langCode = window.LANG_CODE.toLowerCase();
        const criticalDataEndpointsConfig = {
            "/api/v4/settings/countries_currencies": {
                url: "/api/v4/settings/countries_currencies",
                storeName: "currencies",
                setAction: "setAllowCurrencies"
            },
            "/api/v2/player": {url: "/api/v2/player", storeName: "player", setAction: "setData"},
            "/api/v4/auth/restricted_countries": {
                url: "/api/v4/auth/restricted_countries",
                storeName: "player",
                setAction: "setRestrictedCountries"
            },
            "/api/cms/v4/languages": {url: "/api/cms/v4/languages", storeName: "locales", setAction: "setData"},
            [`/api/cms/v4/strings/${langCode}`]: {
                url: `/api/cms/v4/strings/${langCode}`,
                storeName: "interfaceTranslations",
                setAction: "setData"
            },
            "/api/v4/games/categories": {
                url: "/api/v4/games/categories",
                storeName: "gamesCategories",
                setAction: "setData"
            }, ...window.criticalDataEndpointsConfig
        };

        function getData(value) {
            const hasData = value && value.data;
            if (hasData) {
                return {...value, __langCode__: langCode}
            }
            return value
        }

        function hasErrorStatus(status) {
            return status >= 400 && status < 520
        }

        async function fetchEndpoint(endpointConfig) {
            try {
                const response = await fetch(endpointConfig.url, fetchConfig);
                if (hasErrorStatus(response.status)) {
                    throw response
                }
                const value = await response.json();
                return {data: getData(value), endpointConfig: endpointConfig}
            } catch (error) {
                throw {error: error, endpointConfig: endpointConfig}
            }
        }

        function setInitialCriticalData() {
            const telegramLoadedPromise = window.telegramLoadedPromise || Promise.resolve();
            return telegramLoadedPromise.then(() => {
                const promises = Object.values(criticalDataEndpointsConfig).map(fetchEndpoint);
                return Promise.allSettled(promises)
            })
        }

        function sortResults(results) {
            const fulfilled = [];
            const rejected = [];
            const REJECTED = "rejected";
            results.forEach(result => {
                if (result.status === REJECTED) {
                    rejected.push(result)
                } else {
                    fulfilled.push(result)
                }
            });
            return {fulfilled: fulfilled, rejected: rejected}
        }

        window.initialCriticalData = (async () => {
            const response = await setInitialCriticalData();
            const results = sortResults(response);
            if (!results.rejected.length) {
                return results
            }
            const retryResponse = await Promise.allSettled(results.rejected.map(({reason: reason}) => fetchEndpoint(reason.endpointConfig)));
            const retryResults = sortResults(retryResponse);
            return {fulfilled: [...results.fulfilled, ...retryResults.fulfilled], rejected: retryResults.rejected}
        })()
    })()</script>

        mainCookiesKeys = Object.keys(mainCookies),

    window.syncAllCookies = function () {
        for (var i = 0; i < mainCookiesKeys.length; i++) av[mainCookiesKeys[i]] = getLocalValue(mainCookies[mainCookiesKeys[i]]);

        console.debug('syncAllCookies local vars is', av)

        updateIframeValues()

        console.debug('syncAllCookies done', window.analytics_variables)
    }

    function updateIframeValues() {
        getIframeValues(mainCookiesValues, function (data) {
            console.debug('updateIframeValues > getIframeValues data', data)
            for (var i = 0; i < data.value.length; i++) {
                var iframeKeyValue = data.value[i],
                    index = mainCookiesValues.indexOf(iframeKeyValue.name),
                    localValue = av[mainCookiesKeys[index]];
                // Прокидывания user_id для текущего пользователя
                if ((iframeKeyValue.value || localValue) && iframeKeyValue.name === SYNCHRONIZED_COOKIES.user_id) {
                    if (iframeKeyValue.value === localValue) {
                        return
                    }

                    const currentValue = localValue || iframeKeyValue.value

                    setCookie(iframeKeyValue.name, currentValue);
                    av[mainCookiesKeys[index]] = currentValue;
                    setIframeValue(iframeKeyValue.name, currentValue);

                    return
                }
                // Если есть значение во фрейме и оно не равно локальному
                if (iframeKeyValue.value && (!localValue || iframeKeyValue.value !== localValue)) {
                    // то сохраним его в локальную куку (и localStorage)
                    setCookie(iframeKeyValue.name, iframeKeyValue.value);
